name: smiles2docking
channels:
  - conda-forge
dependencies:
  - python=3.11
  - rdkit
  - openbabel
  - pandas
  - pyyaml
  - openpyxl
  - matplotlib
  - pyside6
  - pyinstaller
  - pytest
  - joblib
  - scipy
  - pip
  - pip:
      - typing-extensions
      # MolGpKa default backend (CPU torch + torch-geometric; no torch-scatter).
      - torch>=2.2
      - torch-geometric>=2.4
      - dimorphite-dl>=1.3
      - meeko>=0.5
      - gemmi>=0.6
